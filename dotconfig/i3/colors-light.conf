set $bg #eff1f5
set $red #d20f39
set $green #40a02b
set $yellow #df8e1d
set $blue #1e66f5
set $purple #8839ef
set $aqua #04a5e5
set $gray #8c8fa1
set $darkgray #ccd0da
set $lightgray #4c4f69
set $white #eff1f5
set $window_focused_bg #bcc0cc
set $window_inactive_bg #e6e9ef

# class                 border               backgr               text        indicator  child_border
client.focused          $window_focused_bg   $window_focused_bg   $lightgray  $purple    $darkgray
client.focused_inactive $window_inactive_bg  $window_inactive_bg  $lightgray  $purple    $darkgray
client.unfocused        $window_inactive_bg  $window_inactive_bg  $lightgray  $purple    $darkgray
client.urgent           $red                 $red                 $white      $red       $red

bar {
    status_command i3blocks -c ~/.config/i3/i3blocks.conf
    tray_output primary
    position top
    colors {
        background $bg
        statusline $lightgray
        #                    border     backgr.    text
        focused_workspace    $lightgray $lightgray $bg
        inactive_workspace   $darkgray  $darkgray  $lightgray
        active_workspace     $darkgray  $darkgray  $lightgray
        urgent_workspace     $red       $red       $bg
    }
}

# vim:ft=i3config
