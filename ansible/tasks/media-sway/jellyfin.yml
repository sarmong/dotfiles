- name: install jellyfin server + mpv-shim
  tags:
    - jellyfin
  block:
    - name: jellyfin | ensure apt prerequisites
      become: true
      apt:
        name:
          - curl
          - gnupg
          - apt-transport-https
        state: present

    - name: jellyfin | add signing key
      become: true
      ansible.builtin.get_url:
        url: https://repo.jellyfin.org/jellyfin_team.gpg.key
        dest: /etc/apt/keyrings/jellyfin.gpg.key
        mode: "0644"
        force: false

    - name: jellyfin | add apt repo
      become: true
      ansible.builtin.apt_repository:
        repo:
          "deb [signed-by=/etc/apt/keyrings/jellyfin.gpg.key]
          https://repo.jellyfin.org/{{ ansible_distribution | lower }} {{
          ansible_distribution_release }} main"
        filename: jellyfin
        state: present
        update_cache: true

    - name: jellyfin | install server
      become: true
      apt:
        name:
          - jellyfin-server
          - jellyfin-web
          - jellyfin-ffmpeg7
        state: present

    - name: jellyfin | deploy network.xml
      become: true
      copy:
        src: tasks/media-sway/files/jellyfin/network.xml
        dest: /etc/jellyfin/network.xml
        mode: "0640"
        owner: jellyfin
        group: jellyfin
      register: jellyfin_network

    - name: jellyfin | enable + start service
      become: true
      systemd_service:
        name: jellyfin
        enabled: true
        state: "{{ 'restarted' if jellyfin_network.changed else 'started' }}"

