    - name: jellyfin perms | add jellyfin to user's group
      become: true
      user:
        name: jellyfin
        groups: "{{ ansible_env.USER }}"
        append: true
      register: jellyfin_groups

    - name: jellyfin perms | ensure $HOME is group-readable+traversable
      become: true
      file:
        path: "{{ ansible_env.HOME }}"
        mode: "0750"

    - name: jellyfin perms | ensure /media/$USER exists and is group-readable
      become: true
      file:
        path: "/media/{{ ansible_env.USER }}"
        state: directory
        owner: root
        group: "{{ ansible_env.USER }}"
        mode: "0750"

    - name: jellyfin perms | restart jellyfin to pick up new group
      become: true
      systemd_service:
        name: jellyfin
        state: restarted
      when: jellyfin_groups.changed
