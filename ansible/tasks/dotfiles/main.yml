- name: Link dotfiles
  include_tasks: link.yml
  vars:
    local_dotfiles: "{{ lookup('env', 'XDG_DOTFILES_DIR') }}"
  loop:
    - src: "{{ local_dotfiles }}/dotconfig"
      dest: "{{ ansible_env.XDG_CONFIG_HOME }}"
    - src: "{{ local_dotfiles }}/dotlocal/share/applications"
      dest: "{{ ansible_env.XDG_DATA_HOME }}/applications"
    - src: "{{ local_dotfiles }}/dotlocal/xdg/icons"
      dest: "{{ ansible_env.HOME }}/.local/xdg/icons"
    - src: "{{ local_dotfiles }}/dotlocal/bin"
      dest: "{{ ansible_env.HOME }}/.local"
      itself: true

- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_env.XDG_CONFIG_HOME }}/systemd/user"
    - "{{ ansible_env.XDG_CONFIG_HOME }}/npm"

- name: Corrent npmrc config (for XDG cleanup)
  lineinfile:
    path: "{{ ansible_env.XDG_CONFIG_HOME }}/npm/npmrc"
    line: "{{ item }}"
    mode: "0644"
    create: true
  loop:
    - prefix={{ ansible_env.XDG_DATA_HOME }}/npm
    - cache={{ ansible_env.XDG_CACHE_HOME }}/npm
    - init-module={{ ansible_env.XDG_CONFIG_HOME }}/npm/config/npm-init.js

  # TODO: check if needed, seems like putting contents of user_env.sh into /etc/zsh/zshenv is enough (the followin task)
- name: load env vars for any login shell # lightdm reads this file
  become: true
  copy:
    src: user_env.sh
    dest: "{{ item }}"
    mode: preserve
  loop:
    - /etc/profile.d/user_env.sh
    - /etc/zsh/user_env.sh

- name: load env vars for zsh tty
  become: true
  blockinfile:
    path: /etc/zsh/zshenv ## for some reason zprofile is not loaded
    block: |
      env_file="/etc/zsh/user_env.sh"
      [ -f "$env_file" ] && . "$env_file"

- name: Copy encrypted files
  copy:
    src: "{{ lookup('env', 'XDG_DOTFILES_DIR') }}/{{ item.src }}"
    dest: "{{ ansible_env.XDG_DOTFILES_DIR }}/{{ item.dest }}"
    mode: preserve
  loop:
    - src: "dotconfig/zsh/zsh-local-enc"
      dest: "dotconfig/zsh/zsh-local"
    - src: "dotconfig/git/git-work-enc.conf"
      dest: "dotconfig/git/git-work.conf"
    - src: "dotconfig/git/git-personal-enc.conf"
      dest: "dotconfig/git/git-personal.conf"

- name: smart-browser script
  when: ansible_env.BROWSER == 'google-chrome-stable'
  become: true
  copy:
    dest: /usr/local/bin/smart-browser
    content: |
      #!/bin/sh

      focused=$(xprop -id "$(xdotool getactivewindow 2>/dev/null)" WM_CLASS 2>/dev/null)
      case "$focused" in
        *[Tt]elegram*) exec firefox "$@" ;;
        *)             exec google-chrome-stable "$@" ;;
      esac
    mode: "0755"

- name: smart-browser desktop file
  when: ansible_env.BROWSER == 'google-chrome-stable'
  copy:
    dest: "{{ ansible_env.HOME }}/.local/share/applications/smart-browser.desktop"
    content: |
      [Desktop Entry]
      Name=Smart Browser
      Exec=/usr/local/bin/smart-browser %u
      Type=Application
      MimeType=x-scheme-handler/http;x-scheme-handler/https;text/html;application/xhtml+xml;x-scheme-handler/about;x-scheme-handler/unknown;
      NoDisplay=true

      # vim:ft=dosini
    mode: "0644"

- name: mimeapps.list
  vars:
    browser:
      "{{ (ansible_env.BROWSER == 'google-chrome-stable') |
      ternary('smart-browser', 'firefox') }}"
  ini_file:
    path: "{{ ansible_env.XDG_CONFIG_HOME }}/mimeapps.list"
    section: Default Applications
    option: "{{ item.k }}"
    value: "{{ item.v }}"
    no_extra_spaces: true
    create: true
    mode: "0644"
  loop:
    - { k: application/javascript, v: "nvim.desktop;" }
    - { k: application/pdf, v: "org.pwmt.zathura.desktop;" }
    - { k: application/epub+zip, v: "org.pwmt.zathura.desktop;" }
    - { k: application/x-bittorrent, v: "org.qbittorrent.qBittorrent.desktop;" }
    - { k: application/x-shellscript, v: "nvim.desktop;" }
    - { k: application/x-troff-man, v: "nvim.desktop;" }
    - { k: text/plain, v: "nvim.desktop;" }

    - { k: audio/aac, v: "mpv.desktop;" }
    - { k: audio/flac, v: "mpv.desktop;" }
    - { k: audio/m4a, v: "mpv.desktop;" }
    - { k: audio/midi, v: "mpv.desktop;" }
    - { k: audio/mp3, v: "mpv.desktop;" }
    - { k: audio/mp4, v: "mpv.desktop;" }
    - { k: audio/mpeg, v: "mpv.desktop;" }
    - { k: audio/mpegurl, v: "mpv.desktop;" }
    - { k: audio/mpg, v: "mpv.desktop;" }
    - { k: audio/ogg, v: "mpv.desktop;" }
    - { k: audio/opus, v: "mpv.desktop;" }
    - { k: audio/wav, v: "mpv.desktop;" }
    - { k: audio/webm, v: "mpv.desktop;" }

    - { k: image/bmp, v: "nsxiv.desktop;" }
    - { k: image/gif, v: "nsxiv.desktop;" }
    - { k: image/jpeg, v: "nsxiv.desktop;" }
    - { k: image/jpg, v: "nsxiv.desktop;" }
    - { k: image/png, v: "nsxiv.desktop;" }
    - { k: image/svg+xml, v: "nsxiv.desktop;" }
    - { k: image/svg+xml-compressed, v: "nsxiv.desktop;" }
    - { k: image/tiff, v: "nsxiv.desktop;" }
    - { k: image/webp, v: "nsxiv.desktop;" }
    - { k: image/x-icon, v: "nsxiv.desktop;" }
    - { k: image/x-portable-pixmap, v: "feh.desktop;" }
    - { k: image/x-tga, v: "nsxiv.desktop;" }
    - { k: image/x-xbitmap, v: "nsxiv.desktop;" }
    - { k: image/x-xpixmap, v: "nsxiv.desktop;" }

    - { k: inode/directory, v: "caja-folder-handler.desktop;" }

    - { k: video/avi, v: "mpv.desktop;" }
    - { k: video/flv, v: "mpv.desktop;" }
    - { k: video/mkv, v: "mpv.desktop;" }
    - { k: video/mp4, v: "mpv.desktop;" }
    - { k: video/mp4v-es, v: "mpv.desktop;" }
    - { k: video/mpeg, v: "mpv.desktop;" }
    - { k: video/mpeg-system, v: "mpv.desktop;" }
    - { k: video/ogg, v: "mpv.desktop;" }
    - { k: video/quicktime, v: "mpv.desktop;" }
    - { k: video/webm, v: "mpv.desktop;" }
    - { k: video/x-matroska, v: "mpv.desktop;" }

    - { k: text/html, v: "{{ browser }}.desktop;" }
    - { k: application/xhtml+xml, v: "{{ browser }}.desktop;" }
    - { k: x-scheme-handler/about, v: "{{ browser }}.desktop;" }
    - { k: x-scheme-handler/http, v: "{{ browser }}.desktop;" }
    - { k: x-scheme-handler/https, v: "{{ browser }}.desktop;" }
    - { k: x-scheme-handler/unknown, v: "{{ browser }}.desktop;" }
    - { k: x-scheme-handler/freetube, v: "freetube.desktop" }
    - { k: x-scheme-handler/mpv, v: "mpv-opener.desktop" }
    - { k: x-scheme-handler/umpv, v: "mpv-opener.desktop" }
