- name: Create {{ item.dest }} if needed
  file:
    path: "{{ item.dest }}"
    state: directory

- name: Find all in {{ item.src | basename }}
  find:
    paths: "{{ item.src }}"
    file_type: any
    follow: true
    hidden: true
  register: found_directories
  when: not item.itself | default(false)

- name: Use {{ item.src | basename }} as src if itself=true
  set_fact:
    found_directories:
      files:
        - path: "{{ item.src }}"
      dirs: []
  when: item.itself | default(false)

- name: Backup gtk-3.0 if it is a real directory
  command: mv "{{ item.dest }}/gtk-3.0" "{{ item.dest }}/gtk-3.0~"
  when:
    - item.dest == ansible_env.XDG_CONFIG_HOME
    - (item.dest + '/gtk-3.0') is directory
    - not (item.dest + '/gtk-3.0') is link

- name: Create symbolic links for {{ item.dest }}
  file:
    src: "{{ dir_to_link.path }}"
    dest: "{{ item.dest }}/{{ dir_to_link.path | basename }}"
    state: link
    force: "{{ (dir_to_link.path | basename) in ['mimeapps.list', 'gtk-3.0', 'user-dirs.dirs'] }}"
  loop: "{{ found_directories.files }}"
  loop_control:
    loop_var: dir_to_link
    label:
      "{{ dir_to_link.path | regex_replace('\/home\/\\w+\/(.*)', '~\/\\1') }}"
