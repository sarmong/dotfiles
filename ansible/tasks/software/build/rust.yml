- name: rust | get installed version
  command: "{{ ansible_env.XDG_DATA_HOME }}/cargo/bin/rustup -v"
  ignore_errors: true
  changed_when: false
  failed_when: false
  register: rust_installed

- name: rust | install
  when: rust_installed.rc != 0

  block:
    - name: rust | get install script
      get_url:
        url: https://sh.rustup.rs
        dest: /tmp/rustup.sh
        mode: "0755"

    - name: rust | run install script
      command:
        cmd: "/tmp/rustup.sh -y --no-modify-path"
        creates: "{{ ansible_env.XDG_DATA_HOME }}/cargo/bin/rustup"
      environment: ## Align with zsh-coding
        CARGO_HOME: "{{ ansible_env.XDG_DATA_HOME }}/cargo"
        RUSTUP_HOME: "{{ ansible_env.XDG_DATA_HOME }}/rustup"
