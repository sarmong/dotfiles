      # - newsboat
      - mpv
      - socat ## needed for mpv socket control
      - mpd
      - mpc
      - ncmpcpp
      - mpdris2
      - lynx
      - firefox

- name: Install CLI utils
  become: true
  apt:
    name:
      - pandoc
      - htop
      - trash-cli
      - xclip
      # - tmux
      - ffmpeg
      - ffmpegthumbnailer
      - imagemagick
      - rsync
      - jq
      - yq
      - tree
      - speedtest-cli
      - colordiff
      - bat
      - ytfzf
      - ripgrep
      - thefuck
      - atool
      - unzip
      - zip
      - p7zip
      - moreutils
      - net-tools
      - parallel
      - fdupes
      - libfile-mimeinfo-perl
      - neofetch
      - uglifyjs
      - entr
      - scrot
      - slop
      - powertop
      - brightnessctl
      - urlscan
      - httpie
      - tig
      - zeal
      - tealdeer
      - shellcheck
      - yad
      - pipx
      - golang

- name: Install pipx
  include_tasks: tasks/software/build/pipx.yml
  tags:
    - pipx
  vars:
    pipx_args:
      - name: git-filter-repo
      - name: beets
      - name: qtile
      - name: mitmproxy

- name: Install apm packages
  tags:
    - apm
  include_tasks: apm/main.yml
  loop:
    - lazydocker
    - czkawka-cli
    - dua-cli
    - fnm
    - frece
    - fzf
    - handlr
    - jqp
    - tokei
    - lf
    - fd
    - zoxide
    - bottom
    - onefetch
    - lazygit
    - git-delta
    - rclone
    - pacstall
    - yt-dlp
    - ctpv ## image previewer for lf
    - kitty
    - windowlist
    - supersonic
    - devtoys
    - devtoys.cli

## should be after apm installs pacstall
- name: pacstall | install DE packages
  pacstall:
    name:
      - wmutils
      - awesome-git
      - betterlockscreen
      # - arc-gruvbox-gtk-theme-git
      - simp1e-gruvbox-dark-cursor-theme-git
      - nerd-fonts-jetbrains-mono
      - nerd-fonts-fira-code
      - nerd-fonts-fira-mono
      - keyd
      - xkblayout-state-git
      - volctl

- name: Install applications | pacstall
  become: true
  pacstall:
