- name: Install applications | pacstall
  become: true
  failed_when: false
  pacstall:
    name:
      - vscodium-deb
      - brave-browser-deb
      - spotify-client-deb
      - telegram-bin

- name: Install work applications | pacstall
  when: ansible_distribution == "Ubuntu"
  become: true
  failed_when: false
  pacstall:
    name:
      - slack-deb
      - google-chrome-deb
      - github-cli-bin
