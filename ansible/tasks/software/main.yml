---
- name: Install base packages
  become: true
  apt:
    name:
      - nala
      - git
      - curl
      - wget
      - htop
      - vim
      - libsqlite3-dev
      - ssh
      - man-db
      - plocate
      - zsh
      - dash
      - ufw
      - psmisc

- name: Install service DE packages
  become: true
  apt:
    name:
      - dunst
      - pipewire-audio
      - network-manager-gnome

- name: Install pipewire (Debian only)
  when: ansible_distribution == "Debian"
  become: true
  apt:
    name:
      - pipewire-audio

- name: Install DE packages
  become: true
  apt:
    name:
      - xorg
      - xorg-dev
      - i3
      - i3blocks
      - xdotool
      - wmctrl
      - wmname
      - xdo
      - xvfb
      - picom
      - arandr
      - autorandr
      - lxsession
      - lxappearance
      - papirus-icon-theme
      - qt5ct
      - adwaita-qt6
      - fonts-noto
      - fonts-font-awesome
      - fonts-ebgaramond
      - font-manager
      - fonts-noto-color-emoji
      - inputplug
      - xbindkeys
      - pulsemixer
      - pavucontrol
      - pamixer
      - playerctl
      - bluez
      - blueman
      - gnome-keyring
      - xfce4-power-manager
      - mate-system-monitor
      - conky-std
      - udiskie
      - xarchiver
      - ueberzug
      - dmenu
      - rofi
      - feh
      - libimage-exiftool-perl
      - mediainfo
      - unclutter
      - sxhkd

- name: Install applications
  become: true
  apt:
    name:
      - alacritty
      - kitty
      - caja
      - nsxiv
      - evince
      - zathura
      - zathura-djvu
      - flameshot
      - pass
      - timeshift
      - safeeyes
      - xprintidle
      - redshift
      - geoclue-2.0
      - surf
      - libreoffice
      - kazam
      - simplescreenrecorder
      - goldendict
