---
- name: Enable deb-src in ubuntu.sources ## so that apt module build-deps works
  when: ansible_distribution == "Ubuntu"
  become: true
  replace:
    path: /etc/apt/sources.list.d/ubuntu.sources
    regexp: "^Types: deb$"
    replace: "Types: deb deb-src"
  notify: Apt update

- name: Install base packages
  become: true
  apt:
    name:
      - nala
      - git
      - curl
      - wget
      - htop
      - vim
      - libsqlite3-dev
      - ssh
      - man-db
      - plocate
      - zsh
      - dash
      - ufw
      - psmisc

- name: Install service DE packages
  become: true
  apt:
    name:
      - dunst
      - pipewire-audio
      - network-manager-gnome

- name: Install pipewire (Debian only)
  when: ansible_distribution == "Debian"
  become: true
  apt:
    name:
      - pipewire-audio

- name: Install DE packages
